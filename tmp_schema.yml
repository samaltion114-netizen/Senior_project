components:
  schemas:
    AnalysisStatusEnum:
      enum:
      - pending
      - done
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `done` - Done
        * `failed` - Failed
    CapabilityEnum:
      enum:
      - all
      - interview
      - tagging
      - time_estimation
      - scheduling
      - proof_analysis
      - challenge_generation
      type: string
      description: |-
        * `all` - all
        * `interview` - interview
        * `tagging` - tagging
        * `time_estimation` - time_estimation
        * `scheduling` - scheduling
        * `proof_analysis` - proof_analysis
        * `challenge_generation` - challenge_generation
    CompleteSessionRequest:
      type: object
      properties:
        image:
          type: string
          format: binary
        explanation:
          type: string
          minLength: 1
          maxLength: 5000
      required:
      - explanation
      - image
    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        order:
          type: integer
        metadata:
          type: object
          additionalProperties: {}
        expected_output_text:
          type: string
      required:
      - title
    DailyChallengeRequestRequest:
      type: object
      properties:
        domain:
          $ref: '#/components/schemas/DomainEnum'
        level:
          $ref: '#/components/schemas/LevelEnum'
        minutes:
          type: integer
          maximum: 120
          minimum: 5
          default: 20
      required:
      - domain
      - level
    DomainEnum:
      enum:
      - informatics
      - law
      type: string
      description: |-
        * `informatics` - informatics
        * `law` - law
    EmailVerificationConfirmRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 128
      required:
      - token
    EmailVerificationRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    InterviewMessageRequest:
      type: object
      properties:
        conversation_id:
          type: integer
        message:
          type: string
          minLength: 1
          maxLength: 2000
      required:
      - conversation_id
      - message
    LevelEnum:
      enum:
      - beginner
      - intermediate
      - advanced
      type: string
      description: |-
        * `beginner` - beginner
        * `intermediate` - intermediate
        * `advanced` - advanced
    ModelWeightSelectRequest:
      type: object
      properties:
        capability:
          $ref: '#/components/schemas/CapabilityEnum'
        provider:
          allOf:
          - $ref: '#/components/schemas/ProviderEnum'
          default: local
        model_name:
          type: string
          minLength: 1
          maxLength: 120
        weight_path:
          type: string
          minLength: 1
          maxLength: 500
        metadata:
          type: object
          additionalProperties: {}
      required:
      - capability
      - model_name
      - weight_path
    Objective:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        suggested_by:
          $ref: '#/components/schemas/SuggestedByEnum'
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - created_at
      - description
      - id
      - student
      - tasks
      - title
    ObjectiveRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
        suggested_by:
          $ref: '#/components/schemas/SuggestedByEnum'
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - description
      - title
    PasswordResetConfirmRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 128
        new_password:
          type: string
          minLength: 8
