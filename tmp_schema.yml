components:
  schemas:
    CapabilityEnum:
      enum:
      - all
      - interview
      - tagging
      - time_estimation
      - scheduling
      - proof_analysis
      - challenge_generation
      type: string
      description: |-
        * `all` - all
        * `interview` - interview
        * `tagging` - tagging
        * `time_estimation` - time_estimation
        * `scheduling` - scheduling
        * `proof_analysis` - proof_analysis
        * `challenge_generation` - challenge_generation
    CreateTask:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        order:
          type: integer
        metadata:
          type: object
          additionalProperties: {}
        expected_output_text:
          type: string
      required:
      - title
    DailyChallengeRequest:
      type: object
      properties:
        domain:
          $ref: '#/components/schemas/DomainEnum'
        level:
          $ref: '#/components/schemas/LevelEnum'
        minutes:
          type: integer
          maximum: 120
          minimum: 5
          default: 20
      required:
      - domain
      - level
    DomainEnum:
      enum:
      - informatics
      - law
      type: string
      description: |-
        * `informatics` - informatics
        * `law` - law
    EmailVerificationConfirm:
      type: object
      properties:
        token:
          type: string
          maxLength: 128
      required:
      - token
    EmailVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    InterviewMessage:
      type: object
      properties:
        conversation_id:
          type: integer
        message:
          type: string
          maxLength: 2000
      required:
      - conversation_id
      - message
    LevelEnum:
      enum:
      - beginner
      - intermediate
      - advanced
      type: string
      description: |-
        * `beginner` - beginner
        * `intermediate` - intermediate
        * `advanced` - advanced
    ModelWeightSelect:
      type: object
      properties:
        capability:
          $ref: '#/components/schemas/CapabilityEnum'
        provider:
          allOf:
          - $ref: '#/components/schemas/ProviderEnum'
          default: local
        model_name:
          type: string
          maxLength: 120
        weight_path:
          type: string
          maxLength: 500
        metadata:
          type: object
          additionalProperties: {}
      required:
      - capability
      - model_name
      - weight_path
    Objective:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        suggested_by:
          $ref: '#/components/schemas/SuggestedByEnum'
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - created_at
      - description
      - id
      - student
      - tasks
      - title
    PasswordResetConfirm:
      type: object
      properties:
        token:
          type: string
          maxLength: 128
        new_password:
          type: string
          maxLength: 128
          minLength: 8
      required:
      - new_password
      - token
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedPortfolioProject:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        tech_stack:
          type: object
          additionalProperties: {}
        project_url:
          type: string
          format: uri
          maxLength: 200
        visibility:
          $ref: '#/components/schemas/VisibilityEnum'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioAsset'
          readOnly: true
    PortfolioAsset:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        project:
          type: integer
          readOnly: true
        file:
          type: string
          format: uri
        caption:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - file
      - id
      - project
    PortfolioAssetUpload:
      type: object
      properties:
        file:
          type: string
          format: uri
        caption:
          type: string
          maxLength: 255
      required:
      - file
    PortfolioProject:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        tech_stack:
          type: object
          additionalProperties: {}
        project_url:
          type: string
          format: uri
          maxLength: 200
        visibility:
          $ref: '#/components/schemas/VisibilityEnum'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioAsset'
          readOnly: true
      required:
      - assets
      - id
      - student
      - title
    ProviderEnum:
      enum:
      - local
      - openai
      - mock
      type: string
      description: |-
        * `local` - local
        * `openai` - openai
        * `mock` - mock
    Register:
      type: object
      description: Register a new user as student, expert, or trainer.
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 8
        role:
          $ref: '#/components/schemas/RoleEnum'
        major:
          type: string
        current_status:
          type: string
        goal_text:
          type: string
        timezone:
          type: string
          default: UTC
        expertise_tags:
          type: array
          items:
            type: string
        bio:
          type: string
      required:
      - password
      - role
      - username
    RoleEnum:
      enum:
      - student
      - expert
      - trainer
      type: string
      description: |-
        * `student` - student
        * `expert` - expert
        * `trainer` - trainer
    StatusEnum:
      enum:
      - draft
      - active
      - completed
      type: string
      description: |-
        * `draft` - Draft
        * `active` - Active
        * `completed` - Completed
    SuggestedByEnum:
      enum:
      - ai
      - expert
      - student
      type: string
      description: |-
        * `ai` - AI
        * `expert` - Expert
        * `student` - Student
    TaggingChecklist:
      type: object
      properties:
        text:
          type: string
          maxLength: 6000
        domain:
          $ref: '#/components/schemas/DomainEnum'
      required:
      - text
    Task:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        objective:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        estimated_minutes:
          type: integer
          readOnly: true
        estimation_confidence:
          type: number
          format: double
          readOnly: true
        order:
          type: integer
        metadata:
          type: object
          additionalProperties: {}
        expected_output_text:
          type: string
      required:
      - estimated_minutes
      - estimation_confidence
      - id
      - objective
      - title
    TimeEstimateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          default: ''
        metadata:
          type: object
          additionalProperties: {}
      required:
      - title
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        is_student:
          type: boolean
        is_expert:
          type: boolean
        is_trainer:
          type: boolean
        is_email_verified:
          type: boolean
      required:
      - id
      - username
    VisibilityEnum:
      enum:
      - public
      - private
      type: string
      description: |-
        * `public` - Public
        * `private` - Private
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
